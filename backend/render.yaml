services:
  - type: web
    name: pcb-vision-api
    env: python
    Root Directory: (Leave Blank)
    Build Command: pip install -r backend/app/requirements.txt
    Start Command: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: MODEL_PATH
        value: models/best.pt


       